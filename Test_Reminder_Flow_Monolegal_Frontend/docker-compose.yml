version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reminder_flow_frontend
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - reminder_network

  api:
    build:
      context: ../Test_Reminder_Flow_Monolegal_Backend
      dockerfile: Dockerfile
    container_name: reminder_flow_api
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=reminder_flow_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - reminder_network

  mongodb:
    image: mongo:7.0
    container_name: reminder_flow_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - reminder_network

  redis:
    image: redis:7-alpine
    container_name: reminder_flow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - reminder_network

volumes:
  mongodb_data:
  redis_data:

networks:
  reminder_network:
    driver: bridge
